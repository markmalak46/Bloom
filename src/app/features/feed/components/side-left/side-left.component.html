<aside class="hidden lg:block sticky top-24 h-[calc(100vh-6rem)] w-full">
  <div class="flex h-full flex-col gap-3 rounded-t-3xl bg-white/80 p-3 shadow-sm ring-1 ring-slate-200/70 backdrop-blur-xl dark:bg-slate-900/70 dark:ring-slate-800/80 overflow-y-auto">
    <a [routerLink]="['/feed']" routerLinkActive="bg-linear-to-r from-[#6A3FD9] to-[#3E6EDC] text-white shadow-md rounded-2xl" [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center gap-3 px-4 py-3 text-slate-700 font-semibold dark:text-slate-200 transition-all duration-200">
      <i class="fa-regular fa-newspaper w-5 text-center text-lg"></i>
      <span>Feed</span>
    </a>
    <a [routerLink]="['/notification']" routerLinkActive="bg-linear-to-r from-[#6A3FD9] to-[#3E6EDC] text-white shadow-md rounded-2xl"
      class="group flex items-center gap-3 px-4 py-3 text-slate-700 font-medium hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800 transition-all duration-200">
      <i class="fa-regular fa-bell w-5 text-center text-slate-400 group-hover:text-[#6A3FD9] transition-colors"></i>
      <span>Notifications</span>
    </a>
    <a [routerLink]="['/profile']" routerLinkActive="bg-linear-to-r from-[#6A3FD9] to-[#3E6EDC] text-white shadow-md rounded-2xl"
      class="group flex items-center gap-3 px-4 py-3 text-slate-700 font-medium hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800 transition-all duration-200">
      <i class="fa-regular fa-user w-5 text-center text-slate-400 group-hover:text-[#6A3FD9] transition-colors"></i>
      <span>Profile</span>
    </a>
    <div class="my-1 h-px bg-slate-200 dark:bg-slate-800/60 mx-4"></div>
    <button class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-slate-700 font-medium hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">
      <i class="fa-solid fa-chart-line w-5 text-center text-slate-400 group-hover:text-[#3E6EDC]"></i>
      <span>Trending</span>
    </button>
    <button class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-slate-700 font-medium hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">
      <i class="fa-solid fa-users w-5 text-center text-slate-400 group-hover:text-[#3E6EDC]"></i>
      <span>Friends</span>
    </button>
    <a [routerLink]="['/saved']" routerLinkActive="bg-linear-to-r from-[#6A3FD9] to-[#3E6EDC] text-white shadow-md rounded-2xl"
      class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-slate-700 font-medium hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800 transition-all duration-200 cursor-pointer">
      <i class="fa-regular fa-bookmark w-5 text-center text-slate-400 group-hover:text-[#3E6EDC] transition-colors"></i>
      <span>Saved Posts</span>
    </a>
    <button class="group flex items-center gap-3 rounded-2xl px-4 py-3 text-slate-700 font-medium hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800">
      <i class="fa-solid fa-calendar-days w-5 text-center text-slate-400 group-hover:text-[#3E6EDC]"></i>
      <span>Events</span>
    </button>
  </div>
</aside>
