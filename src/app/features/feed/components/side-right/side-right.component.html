<aside class="hidden lg:block w-full font-sans">
    <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-[16px] font-bold text-slate-800 dark:text-white">
                Suggested Friends
            </h2>
            @if(!isLoading){
            <span class="text-xs font-semibold text-slate-500 dark:text-slate-400">
                {{ filteredSuggestions.length }}
            </span>
            }
        </div>
        <div class="relative mb-4">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm"></i>
            <input type="text" [(ngModel)]="searchTerm"
                class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2.5 pl-9 pr-3 text-sm text-slate-800 outline-none transition focus:border-[#6A3FD9] focus:bg-white dark:border-slate-700 dark:bg-slate-800 dark:text-white"
                placeholder="Search friends..." />
        </div>
        <div class="flex flex-col gap-3 max-h-105 overflow-y-auto no-scrollbar pr-1">
            @if(isLoading) {
            <div class="flex justify-center py-6">
                <i class="fa-solid fa-spinner fa-spin text-[#6A3FD9]"></i>
            </div>
            } @else {
            @for(user of filteredSuggestions; track user._id) {
            <div
                class="flex items-center gap-3 rounded-xl px-2 py-2 transition hover:bg-slate-50 dark:hover:bg-slate-800">
                <img [src]="user.photo || 'https://pub-3cba56bacf9f4965bbb0989e07dada12.r2.dev/linkedPosts/default-profile.png'"
                    class="w-10 h-10 rounded-full object-cover shrink-0" />
                <div class="flex-1 min-w-0">
                    <a [routerLink]="['/user', user._id]" class="block truncate text-sm font-semibold text-gray-900 transition-colors hover:text-indigo-600
                    dark:text-white dark:hover:text-indigo-400">
                        {{ user.name }}
                    </a>
                    <span class="text-xs text-slate-400">
                        {{ user.followersCount || 0 }} followers
                    </span>
                </div>
                <button (click)="followUser(user._id)"
                    [ngClass]="user.following ? 'bg-slate-200 text-slate-700 hover:bg-slate-300' : 'bg-linear-to-r from-indigo-600 to-violet-600 text-white hover:from-indigo-700 hover:to-violet-700'"
                    class="shrink-0 flex items-center gap-1 text-xs font-bold px-3 py-1.5 rounded-lg transition-all cursor-pointer shadow-sm">
                    <i [class]="user.following ? 'fa-solid fa-user-check' : 'fa-solid fa-user-plus'"
                        class="text-[11px]"></i>
                    <span>{{ user.following ? 'Following' : 'Follow' }}</span>
                </button>
            </div>
            }
            @if(filteredSuggestions.length === 0){
            <div class="text-center py-6">
                <i class="fa-solid fa-user-slash text-slate-300 text-xl mb-2 block"></i>
                <span class="text-slate-400 text-sm">No matches found</span>
            </div>
            }
            }
        </div>
        <div class="mt-4 pt-3 border-t border-slate-100 dark:border-slate-800">
            <button routerLink="/suggestions" class="text-sm text-[#6A3FD9] font-semibold hover:underline">
                View all
            </button>
        </div>
    </div>
</aside>
