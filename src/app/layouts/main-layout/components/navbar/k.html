<nav class="fixed inset-x-0 top-0 z-50">    <div class="flex w-full items-center justify-between bg-white/80 px-4 py-3 shadow-sm backdrop-blur-xl border-b border-slate-100 dark:bg-slate-950/80 dark:border-slate-800/60 lg:px-8">        <div class="hidden md:flex items-center gap-1">            <a routerLink="/feed"                routerLinkActive="text-[#6A3FD9] bg-[#6A3FD9]/8"                [routerLinkActiveOptions]="{ exact: true }"                class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:text-white dark:hover:bg-slate-800/60 transition-all duration-200">                <i class="fa-solid fa-house text-[13px]"></i>                <span>Feed</span>            </a>            <a routerLink="/profile"                routerLinkActive="text-[#6A3FD9] bg-[#6A3FD9]/8"                class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:text-white dark:hover:bg-slate-800/60 transition-all duration-200">                <i class="fa-regular fa-user text-[13px]"></i>                <span>Profile</span>            </a>            <a routerLink="/notification"                routerLinkActive="text-[#6A3FD9] bg-[#6A3FD9]/8"                class="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold text-slate-500 hover:text-slate-800 hover:bg-slate-100 dark:text-slate-400 dark:hover:text-white dark:hover:bg-slate-800/60 transition-all duration-200">                <i class="fa-regular fa-bell text-[13px]"></i>                <span>Notifications</span>            </a>        </div>        <div class="flex items-center gap-2">            <button type="button" (click)="themeService.toggle()"                class="hidden md:flex h-9 w-9 items-center justify-center rounded-xl text-slate-500 hover:bg-slate-100 hover:text-slate-800 dark:text-slate-400 dark:hover:bg-slate-800 dark:hover:text-slate-200 transition-all duration-200 cursor-pointer"                title="Toggle theme">                @if(themeService.isDark) {                    <i class="fa-solid fa-sun text-amber-400 text-sm"></i>                } @else {                    <i class="fa-solid fa-moon text-sm"></i>                }            </button>            <div class="relative">                <button type="button" id="user-menu-button" aria-expanded="false"                    data-dropdown-toggle="user-dropdown" data-dropdown-placement="bottom-end"                    class="flex items-center gap-2.5 pl-1 pr-3 py-1 rounded-xl border border-slate-200 bg-white hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-slate-800 transition-all duration-200 cursor-pointer focus:outline-none focus:ring-2 focus:ring-[#6A3FD9]/20">                    <img class="h-8 w-8 rounded-lg object-cover border border-slate-200 dark:border-slate-700"                        [src]="userPhoto" [alt]="userName" />                    <span class="hidden sm:block text-sm font-bold text-slate-700 dark:text-slate-200 max-w-24 truncate">                        {{ userName }}                    </span>                    <i class="fa-solid fa-chevron-down text-[10px] text-slate-400 hidden sm:block"></i>                </button>                <div id="user-dropdown"                    class="z-50 hidden w-64 overflow-hidden rounded-2xl border border-slate-200/80 bg-white shadow-xl shadow-slate-200/60 dark:border-slate-800 dark:bg-slate-900 dark:shadow-slate-950/60 mt-1">                    <div class="flex items-center gap-3 px-4 py-3.5 border-b border-slate-100 dark:border-slate-800">                        <img class="h-10 w-10 rounded-xl object-cover" [src]="userPhoto" [alt]="userName" />                        <div class="min-w-0">                            <p class="text-sm font-bold text-slate-800 dark:text-white truncate">{{ userName }}</p>                            <p class="text-xs text-slate-400 font-medium">View your profile</p>                        </div>                    </div>                    <ul class="p-1.5 space-y-0.5">                        <li>                            <a routerLink="/profile"                                class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white transition-colors">                                <i class="fa-regular fa-user w-4 text-center text-slate-400"></i>                                Profile                            </a>                        </li>                        <li>                            <a routerLink="/saved"                                class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white transition-colors">                                <i class="fa-regular fa-bookmark w-4 text-center text-slate-400"></i>                                Saved Posts                            </a>                        </li>                        <li>                            <a routerLink="/change"                                class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white transition-colors">                                <i class="fa-solid fa-gear w-4 text-center text-slate-400"></i>                                Settings                            </a>                        </li>                        <li>                            <button type="button" (click)="themeService.toggle()"                                class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-slate-900 dark:text-slate-300 dark:hover:bg-slate-800 dark:hover:text-white transition-colors cursor-pointer">                                <i class="fa-solid w-4 text-center text-slate-400"                                    [class.fa-moon]="!themeService.isDark"                                    [class.fa-sun]="themeService.isDark"></i>                                @if(themeService.isDark) { Light Mode } @else { Dark Mode }                            </button>                        </li>                        <li class="pt-0.5 border-t border-slate-100 dark:border-slate-800 mt-0.5">                            <button type="button" (click)="logOut()"                                class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm font-semibold text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors cursor-pointer">                                <i class="fa-solid fa-right-from-bracket w-4 text-center"></i>                                Sign Out                            </button>                        </li>                    </ul>                </div>            </div>            <button data-collapse-toggle="mobile-navbar" type="button"                class="flex h-9 w-9 items-center justify-center rounded-xl text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800 transition-colors cursor-pointer md:hidden"                aria-controls="mobile-navbar" aria-expanded="false">                <span class="sr-only">Open menu</span>                <i class="fa-solid fa-bars text-sm"></i>            </button>        </div>    </div>    <div id="mobile-navbar" class="hidden w-full md:hidden">        <div class="border-b border-slate-200 bg-white/95 px-4 pb-4 pt-2 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-950/95">            <ul class="space-y-1">                <li>                    <a routerLink="/feed" routerLinkActive="bg-[#6A3FD9]/8 text-[#6A3FD9]"                        [routerLinkActiveOptions]="{ exact: true }"                        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors">                        <i class="fa-solid fa-house w-4 text-center"></i> Feed                    </a>                </li>                <li>                    <a routerLink="/profile" routerLinkActive="bg-[#6A3FD9]/8 text-[#6A3FD9]"                        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors">                        <i class="fa-regular fa-user w-4 text-center"></i> Profile                    </a>                </li>                <li>                    <a routerLink="/notification" routerLinkActive="bg-[#6A3FD9]/8 text-[#6A3FD9]"                        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors">                        <i class="fa-regular fa-bell w-4 text-center"></i> Notifications                    </a>                </li>                <li>                    <a routerLink="/saved"                        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors">                        <i class="fa-regular fa-bookmark w-4 text-center"></i> Saved Posts                    </a>                </li>                <li>                    <a routerLink="/change"                        class="flex items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors">                        <i class="fa-solid fa-gear w-4 text-center"></i> Settings                    </a>                </li>                <li>                    <button type="button" (click)="themeService.toggle()"                        class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-slate-600 hover:bg-slate-50 dark:text-slate-300 dark:hover:bg-slate-800 transition-colors cursor-pointer">                        <i class="fa-solid w-4 text-center" [class.fa-moon]="!themeService.isDark" [class.fa-sun]="themeService.isDark"></i>                        @if(themeService.isDark) { Light Mode } @else { Dark Mode }                    </button>                </li>                <li class="pt-1 border-t border-slate-100 dark:border-slate-800">                    <button type="button" (click)="logOut()"                        class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-sm font-semibold text-red-500 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors cursor-pointer">                        <i class="fa-solid fa-right-from-bracket w-4 text-center"></i> Sign Out                    </button>                </li>            </ul>        </div>    </div></nav>
